<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
    <style>
        body{
            background-color: lightgreen;
            background-image: url(https://img1.picmix.com/output/stamp/normal/3/9/4/7/1467493_db9e0.gif);
            background-size: 200px;
            background-repeat: no-repeat;
            background-position: 100% 100%;
            background-attachment: fixed;
        }
        p{
            font-size: 0.9in;
            color: whitesmoke;
            background-image: url(https://wallpapers.com/images/featured/abstract-background-6m6cjbifu3zpfv84.jpg);
            background-size: cover;
        }
        div{
            width: 500px;
            height: 500px;
            margin: 30px;
        }
        #d1{
            background-image: url(https://www.bunchesofblooms.ca/wp-content/uploads/2024/01/fall-2024-6509.jpg);
            background-size: cover;
            border: hotpink 30px groove;
        }
        #d2{
            border: solid 50px;           
            border-image: linear-gradient(orange, red, purple) 30; 
            background-image: linear-gradient(rgba(255,165,0,0.2),rgba(255,0,0,0.3), rgba(0,0,255,0.4)), url(images/feature-mobile.jpg);
            background-size: cover;
        }
        #img1{
            width: 50%;
            margin: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0px 0px 50px hotpink;
        }
        #img2{
            margin-top: 50px;
            width: 800px;
            box-shadow: 10px 10px darkblue, 20px -20px hotpink;
        }
    </style>
</head>
<body>
    <p>Ми вивчаємо роботу з зображеннями</p>
<div id="d1"></div>
<div id="d2"></div>
<img src="https://www.gardenia.net/wp-content/uploads/2023/05/types-of-flowers.webp" alt="flowers" title="flowers" id="img1" />
<img src="images/feature-mobile.jpg" alt="flowers" title="flowers" id="img2" />

</body>
</html>
